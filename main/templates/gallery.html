{% extends 'base.html' %}
{% load static %}
{% block content %}
<section>
   <div class="back_re">
      <div class="container">
         <div class="row">
            <div class="col-md-12">
               <div class="title">
                  <h2>our gallery</h2>
               </div>
            </div>
         </div>
      </div>
   </div>
   <!-- gallery -->
   <div class="gallery">
      <div class="container">
         <div class="row">
            {% for object in gallery %}
            <div class="col-md-3 col-sm-6">
               <div class="gallery_img">
                  <figure><img src="{{ object.image.url }}" alt="#" /></figure>
               </div>
            </div>
            {% endfor %}
         </div>
      </div>
   </div>
   <!-- end gallery -->
</section>
{% endblock %}
